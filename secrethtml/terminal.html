<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terminal Chat</title>
  <link rel="stylesheet" href="../css/terminal.css">
</head>
<body>
  <div id="terminal">
    <div class="terminal-line system">Terminal Chat v1.0</div>
    <div class="terminal-line system">Type 'help' for available commands</div>
    <div class="terminal-line system">================================</div>
    <div id="output"></div>
    <div id="input-line">
      <span class="prompt">user@terminal:~$ </span>
      <input type="text" id="user-input" autofocus autocomplete="off">
    </div>
  </div>
  <script src="../scripts/terminal.js"></script>
</body>
</html>
